openapi: 3.0.0
info:
  title: Actifit Node API 
  version: 1.0.0
  description: API for connecting to Actifit end points
servers:
  - url: http://localhost:3120 # Adjust to your server URL
    description: Development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Exercise:
      type: object
      properties:
        name: { type: 'string', description: 'Name of the exercise', example: 'Push-ups' }
        sets: { type: 'integer', description: 'Number of sets', example: 3 }
        reps: { type: 'string', description: 'Repetition range or exact reps', example: '8-12' }
        duration: { type: 'string', description: 'Duration for timed exercises', example: '30-60s' }
        notes: { type: 'string', description: 'Additional notes for the exercise', example: 'Keep core tight.' }
      required: [name, sets]
    Workout:
      type: object
      properties:
        workoutName: { type: 'string', description: 'Name of the workout plan', example: 'My First Workout Plan' }
        description: { type: 'string', description: 'Description of the workout', example: 'A beginner-friendly full body routine.' }
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/Exercise'
        explanation: { type: 'string', description: 'Optional explanation for the workout', example: 'This workout focuses on compound movements.', nullable: true }
      required: [workoutName, description, exercises]
    WorkoutResponse: # Schema for workout objects returned by the API
      type: object
      properties:
        _id: { type: 'string', description: 'MongoDB ObjectId of the workout', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        userId: { type: 'string', description: 'ID of the user who owns the workout', example: '651a9e8f1d2e3f4a5b6c7d80' }
        workoutName: { type: 'string', example: 'My First Workout Plan - UPDATED' }
        description: { type: 'string', example: 'An updated beginner-friendly full body routine.' }
        timestamp: { type: 'string', format: 'date-time', description: 'Creation timestamp', example: '2023-10-02T10:00:00.000Z' }
        lastModified: { type: 'string', format: 'date-time', description: 'Last modification timestamp', example: '2023-10-02T11:30:00.000Z', nullable: true }
        exercises:
          type: array
          items:
            $ref: '#/components/schemas/Exercise'
        explanation: { type: 'string', nullable: true, example: 'This workout focuses on compound movements for overall strength.' }
      required: [_id, userId, workoutName, description, timestamp, exercises]
    ErrorResponse:
      type: object
      properties:
        success: { type: 'boolean', example: false }
        error: { type: 'string', example: 'Internal server error.' }
        details: { type: 'string', example: 'Specific error message', nullable: true }
        message: { type: 'string', example: 'Workout not found or does not belong to this user.', nullable: true }
    SuccessResponse:
      type: object
      properties:
        success: { type: 'boolean', example: true }
        message: { type: 'string', example: 'Operation successful.' }
    DailyDelegationPool:
      type: object
      properties:
        hive_pool: { type: 'number', format: 'float', description: 'Daily delegation pool for HIVE.', example: 12345.67 }
        steem_pool: { type: 'number', format: 'float', description: 'Daily delegation pool for STEEM.', example: 9876.54 }
      required: [hive_pool, steem_pool]
    DailyTipEntry:
      type: object
      properties:
        _id: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        text: { type: 'string', example: 'Stay hydrated for better performance!' }
        date: { type: 'string', format: 'date-time', example: '2023-10-02T12:00:00.000Z' }
        # Add other fields if you know them
      required: [text, date]
    LoginImage:
      type: object
      properties:
        imgUrl: { type: 'string', format: 'url', example: 'https://raw.githubusercontent.com/actifit/actifit-landingpage/master/static/img/insta_achive_earn.png' }
      required: [imgUrl]
    TutorialVideo:
      type: object
      properties:
        vidUrl: { type: 'string', format: 'url', example: 'https://www.youtube.com/watch?v=kUBZJ3EpoKY' }
      required: [vidUrl]
    PostEntry:
      type: object
      description: A generic post object. Refine with actual fields from your 'posts' collection.
      properties:
        _id: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        permlink: { type: 'string', example: 'my-awesome-post-title' }
        title: { type: 'string', example: 'My Awesome Post' }
        author: { type: 'string', example: 'actifit-user' }
        # ... add other common post fields
    NewsEntry:
      type: object
      description: A news item. Refine with actual fields from your 'news' collection.
      properties:
        _id: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        title: { type: 'string', example: 'Actifit App Update 1.5.0 Released!' }
        body: { type: 'string', example: 'We have exciting new features...' }
        date: { type: 'string', format: 'date-time', example: '2023-10-01T09:00:00.000Z' }
        enabled: { type: 'boolean', example: true }
        # ... add other fields
    SurveyOption:
      type: object
      properties:
        id: { type: 'string', example: 'option1' }
        text: { type: 'string', example: 'Yes, I use it daily!' }
        # Add any other fields for survey options (e.g., voteCount if public)
      required: [id, text]
    SurveyEntry:
      type: object
      description: A survey item. Refine with actual fields from your 'surveys' collection.
      properties:
        _id: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        title: { type: 'string', example: 'How often do you use Actifit?' }
        description: { type: 'string', example: 'Help us improve by telling us about your usage.' }
        enabled: { type: 'boolean', example: true }
        date: { type: 'string', format: 'date-time', example: '2023-09-20T10:00:00.000Z' }
        survey_reward: { type: 'number', example: 10 }
        options:
          type: array
          items:
            $ref: '#/components/schemas/SurveyOption'
        # ... add other fields
    CaptchaVerifyResponse:
      type: object
      properties:
        success: { type: 'boolean', example: true }
        error: { type: 'string', example: 'error', nullable: true }
    SupplyAFITResponse:
      type: string # The endpoint returns a string representation of a number
      example: '1036231' # Example for circulatingSupplyAFIT, could be '2000000' for totalSupplyAFIT
    TokenPriceResponse:
      type: object
      properties:
        token: { type: 'string', example: 'BNB' }
        price: { type: 'number', format: 'float', example: 300.5432 }
      required: [token, price]
    DexTradeAFITUSDTResponse:
      type: object
      properties:
        'AFIT/USDT':
          type: object
          properties:
            price: { type: 'number', format: 'float', example: 0.122 }
            up: { type: 'number', format: 'float', example: 0.1 }
            down: { type: 'number', format: 'float', example: 0.05 }
          required: [price, up, down]
    ChainInfo:
      type: object
      description: Generic object for chain information. Refine based on actual 'utils.getChainInfo' output.
      example: { 'chain_id': '...' }
    AccountData:
      type: object
      description: Generic object for account data. Refine based on actual 'utils.getAccountData' output.
      example: { 'HIVE': { 'name': '...', 'voting_power': '...' } }
    PendingRewardsResponse:
      type: object
      properties:
        pendingRewards: { type: 'number', format: 'float', example: 15.75 }
      required: [pendingRewards]
    VotingStatusResponse:
      type: object
      properties:
        status: { type: 'object', description: 'Voting status object from DB.' } # Refine if you know the structure
        vp: { type: 'number', format: 'float', example: 85.2 }
        reward_start: { type: 'string', example: '02h 30m' }
      required: [status, vp, reward_start]
    UserVotedSurveyResponse:
      type: object
      properties:
        voted: { type: 'boolean', example: true }
      required: [voted]
    VoteSurveySuccessResponse:
      type: object
      properties:
        status: { type: 'string', example: 'success' }
        rewarded: { type: 'number', example: 10 }
      required: [status, rewarded]
    TransactionOutcome:
      type: object
      description: The outcome object of a blockchain transaction. Refine with actual fields.
      properties:
        tx:
          type: object
          properties:
            ref_block_num: { type: 'integer', example: 12345 }
            # ... other transaction fields
        # ... other fields like 'id', 'block_num', etc.
      required: [tx]
      example: { "tx": { "ref_block_num": 12345, "id": "tx_id_hash", "block_num": 123 } }
    AvailableHiveNodesResponse:
      type: object
      properties:
        hiveNodes:
          type: array
          items: { type: 'string', format: 'url', example: 'https://api.hive.blog' }
      required: [hiveNodes]
    DelegateRCOutcome:
      type: object
      description: Outcome of the RC delegation transaction. Refine based on actual 'utils.delegateRC' output.
      example: { 'success': true, 'txId': '...' }
    MemoDecodeResponse:
      type: object
      properties:
        xcstkn: { type: 'string', description: 'Decoded memo content.', example: 'some_decoded_token' }
      required: [xcstkn]
    ClaimRewardsResponse:
      type: object
      properties:
        hive: { type: 'object', example: { 'success': true } } # Refine with actual claim response
        steem: { type: 'object', example: { 'success': true } } # Refine
        blurt: { type: 'object', example: { 'success': true } } # Refine
      required: [hive, steem, blurt]
    MarketPair:
      type: object
      properties:
        name: { type: 'string', example: 'AFIT/USDT' }
        link: { type: 'string', format: 'url', example: 'https://www.digifinex.com/en-ww/trade/USDT/AFIT' }
      required: [name, link]
    MarketExchange:
      type: object
      properties:
        chain: { type: 'string', example: 'BSC' }
        exchange: { type: 'string', example: 'Digifinex' }
        link: { type: 'string', format: 'url', example: 'https://links.actifit.io/digi' }
        icon: { type: 'string', example: '' } # Assuming empty string as per your data
        pairs:
          type: array
          items:
            $ref: '#/components/schemas/MarketPair'
      required: [chain, exchange, link, pairs]
    RecalculateUserTokensResponse:
      type: string
      description: Success message upon recalculating and updating user token count.
      example: 'success recalculating & updating user token count: 1234.56'
    FetchUserDataResponse:
      type: object
      properties:
        success: { type: 'boolean', example: true }
        userdata:
          type: object
          description: User account data returned by utils.validateAccountLogin. Refine with actual fields.
          example: { "id": "123", "name": "actifit-user", "posting": { "key_auths": [["STM123...", 1]] } }
      required: [success, userdata]
    AccessDeniedResponse:
      type: object
      properties:
        success: { type: 'boolean', example: false }
        message: { type: 'string', example: 'Invalid user' }
      required: [success, message]
    ResetActionSuccess:
      type: object
      properties:
        status: { type: 'string', example: 'success' }
      required: [status]
    DeletedAccountRecord:
      type: object
      properties:
        user: { type: 'string', example: 'deleted-user' }
        date: { type: 'string', format: 'date-time', example: '2023-10-02T12:00:00.000Z' }
        approach: { type: 'string', example: 'keychain' }
        platform: { type: 'string', example: 'web' }
      required: [user, date]
    UpdateSettingsSuccess:
      type: object
      properties:
        success: { type: 'boolean', example: true }
      required: [success]
    UserSettingsData:
      type: object
      properties:
        user: { type: 'string', example: 'actifit-user' }
        settings:
          type: object
          description: User-specific settings object. Refine with actual fields.
          example: { "notifications": { "enabled": true }, "theme": "dark" }
      required: [user, settings]
    NotificationTypesResponse:
      type: array
      items:
        type: string # Assuming config.notificationTypes is an array of strings
      example: ['new_post', 'mention', 'vote', 'receive_afit']
    LoginKeychainMessage:
      type: object
      properties:
        message: { type: 'string', example: 'your_encrypted_memo_message' }
      required: [message]
    LoginAuthSuccess:
      type: object
      properties:
        success: { type: 'boolean', example: true }
        message: { type: 'string', example: 'Authentication successful!' }
        token: { type: 'string', example: 'eyJhbGciOiJIUzI1Ni...' }
        userdata:
          type: object
          description: User account data. Refine with actual fields.
          example: { "id": "123", "name": "actifit-user" }
      required: [success, message, token, userdata]
    UserTokensDetails:
      type: object
      properties:
        username: { type: 'string', example: 'actifit-user' }
        tokens: { type: 'number', format: 'float', example: 1234.567 }
        afitx: { type: 'number', format: 'float', example: 100.00 }
        # ... other token-related fields if 'grabUserTokensFunc' returns them
      required: [username, tokens] # Add other required fields if any
    ThreadParamResponse:
      type: string
      example: 'true' # Or 'false' depending on BOT_THREAD env var
    TransactionItem:
      type: object
      description: A single token transaction entry. Refine with actual fields.
      properties:
        user: { type: 'string', example: 'actifit-user' }
        reward_activity: { type: 'string', example: 'Daily_Activity' }
        token_count: { type: 'number', format: 'float', example: 50.0 }
        date: { type: 'string', format: 'date-time', example: '2023-10-01T10:00:00.000Z' }
        # ... other transaction fields
    PostByTagItem:
      type: object
      description: A post filtered by tag. Refine with actual fields from 'verified_posts'.
      example: { "author": "actifit-user", "permlink": "my-post-about-tag", "json_metadata": { "tags": ["fitness", "actifit"] } }
    SignupTransactionItem:
      type: object
      description: A signup transaction record. Refine with actual fields from 'signup_transactions'.
      properties:
        account_name: { type: 'string', example: 'new-actifit-user' }
        referrer: { type: 'string', example: 'actifit-referrer' }
        account_created: { type: 'boolean', example: true }
        date: { type: 'string', format: 'date-time', example: '2023-09-15T08:00:00.000Z' }
        # ... other signup-related fields
    VerifiedNewbieItem:
      type: object
      description: A verified newbie account entry. Refine with actual fields.
      properties:
        user: { type: 'string', example: 'newbie-user' }
        verify_date: { type: 'string', format: 'date-time', example: '2023-10-01T12:00:00.000Z' }
        sm_verif_lnk: { type: 'string', example: 'https://twitter.com/...' }
        verif_mod: { type: 'string', example: 'moderator1' }
      required: [user, verify_date]
    ActiveRefRewardInfo:
      type: object
      properties:
        account_name: { type: 'string', example: 'referred-user' }
        referrer: { type: 'string', example: 'referrer-user' }
        account_created: { type: 'boolean', example: true }
        date: { type: 'string', format: 'date-time', example: '2023-09-10T10:00:00.000Z' }
        ref_rew_act_days: { type: 'integer', example: 30 }
        ref_rew_pct: { type: 'integer', example: 15 }
        referrer_cur_rank: { type: 'number', format: 'float', example: 60 }
        referrer_cur_afit: { type: 'number', format: 'float', example: 100000 }
        referrer_cur_afitx: { type: 'number', format: 'float', example: 500 }
      required: [account_name, referrer, account_created, date, ref_rew_act_days, ref_rew_pct]
    AccountsTotalAFITStats:
      type: object
      properties:
        accounts: { type: 'integer', example: 15000 }
        total: { type: 'number', format: 'float', example: 5000000.75 }
      required: [accounts, total]
    TokensBurntStats:
      type: array
      items:
        type: object
        properties:
          _id: { type: 'string', nullable: true } # Null if grouped without specific ID
          tokens_burnt: { type: 'number', format: 'float', example: 12345.67 }
          burn_trx_count: { type: 'integer', example: 123 }
        required: [tokens_burnt, burn_trx_count]
    LastSignupClaimedResponse:
      type: object
      properties:
        user: { type: 'string', example: 'actifit-user' }
        claimDate: { type: 'string', format: 'date-time', example: '2024-01-10T00:00:00.000Z' }
      required: [user, claimDate]
    MyFreeSignupLinkItem:
      type: object
      properties:
        _id: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        code: { type: 'string', example: 'MyPromoCode123' }
        entries: { type: 'integer', example: 1 }
        delegation: { type: 'boolean', example: true }
        signup_reward: { type: 'boolean', example: true }
        referrer_reward: { type: 'boolean', example: true }
        assigned_user: { type: 'string', example: 'actifit-user' }
        date: { type: 'string', format: 'date-time', example: '2023-10-01T00:00:00.000Z' }
      required: [code, entries] # Simplified required
    MyFreeSignupLinksResponse:
      type: object
      properties:
        result:
          type: array
          items:
            $ref: '#/components/schemas/MyFreeSignupLinkItem'
      required: [result]
    ClaimFreeSignupAccountsSuccess:
      type: object
      properties:
        status: { type: 'string', example: 'success' }
      required: [status]
    ClaimableFreeAccountsResponse:
      type: object
      properties:
        status: { type: 'boolean', example: true }
      required: [status]
    ModActionSuccessResponse:
      type: object
      properties:
        status: { type: 'string', example: 'success' }
        # Other dynamic fields based on action (e.g., txId, URL for freesignup)
      required: [status]
    ModActionErrorResponse:
      type: object
      properties:
        error: { type: 'string', example: 'Account does not have proper privileges' }
      required: [error]
    UserBridgeEligibleResponse:
      type: object
      properties:
        eligible: { type: 'boolean', example: true }
      required: [eligible]
    BridgeTransactionItem:
      type: object
      properties:
        user: { type: 'string', example: 'actifit-user' }
        wallet: { type: 'string', example: '0x123abc...' }
        afitTrx: { type: 'string', example: 'AFIT_TX_ID' }
        hbdTrx: { type: 'string', example: 'HBD_TX_ID' }
        status: { type: 'string', example: 'pending', enum: ['pending', 'complete', 'failed'] }
        date: { type: 'string', format: 'date-time', example: '2023-10-01T12:00:00.000Z' }
      required: [user, wallet, afitTrx, hbdTrx, status, date]
    AppendBridgeTransactionSuccess:
      type: object
      properties:
        status: { type: 'string', example: 'success' }
      required: [status]
    VerifySignBSCAddSuccess:
      type: object
      properties:
        success: { type: 'boolean', example: true }
      required: [success]
    StoreUserWalletAddressSuccess:
      type: object
      properties:
        status: { type: 'string', example: 'success' }
      required: [status]
    GenericObject:
      type: object
      description: A generic object, replace with a specific schema when details are known.
      example: {}
    DeleteUserWalletAddressSuccess:
      type: object
      properties:
        status: { type: 'string', example: 'success' }
      required: [status]
    UserWalletAddressItem:
      type: object
      properties:
        _id: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        user: { type: 'string', example: 'actifit-user' }
        wallet: { type: 'string', example: '0x123abc456def789ghi012jkl345mno678pqr901st' }
        chain: { type: 'string', example: 'BSC' }
        # Add other fields if present in user_wallet_address collection, like 'tokens' from sort({tokens: -1})
      required: [user, wallet, chain]
    AirdropDataDisplayResponse:
      type: string
      example: '["0xwallet1","0xwallet2",]["1000","500",]' # Raw string output
    AirdropEntry:
      type: object
      properties:
        wallet: { type: 'string', example: '0x123abc456def789ghi012jkl345mno678pqr901st' }
        reward: { type: 'number', format: 'float', example: 123.45 }
      required: [wallet, reward]
    AirdropResultsEntry:
      type: object
      properties:
        _id: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        user: { type: 'string', example: 'actifit-user' }
        tokens_count: { type: 'number', format: 'float', example: 1500.25 }
        afit_bsc_reward: { type: 'number', format: 'float', example: 123.45 }
        # Add other fields from afit_bsc_hive_airdrop
      required: [user, tokens_count, afit_bsc_reward]
    UserTokensItem: # From topAFITHolders
      type: object
      properties:
        user: { type: 'string', example: 'actifit-user' }
        tokens: { type: 'number', format: 'float', example: 50000.123 }
        # Add other fields if 'user_tokens' collection has them
      required: [user, tokens]
    AFITXHolderItem: # From topAFITXHolders
      type: object
      properties:
        account: { type: 'string', example: 'actifit-user' }
        balance: { type: 'number', format: 'float', example: 12345.678 }
      required: [account, balance]
    AFITXHolderPrettyResponse:
      type: string
      example: "#|Token Holder | AFITX Tokens Held |<br/>\n|---|---|---|<br/>\n1|@actifit|12345.678|<br/>" # Example of markdown table
    AFITXUserData: # From afitxData/:user
      type: object
      properties:
        balance: { type: 'number', format: 'float', example: 1234.56 }
        # ... other AFITX related user data
      required: [balance]
    DelegationPaymentItem:
      type: object
      properties:
        _id: { type: 'object', nullable: true } # Null when grouped by null
        tokens_distributed: { type: 'number', format: 'float', example: 15000.0 }
        user_count: { type: 'integer', example: 150 }
      required: [tokens_distributed, user_count]
    TotalTokensDistributedItem:
      type: object
      properties:
        _id:
          type: object
          properties:
            reward_activity: { type: 'string', example: 'Daily_Activity' }
          nullable: true # For the total entry with _id: null
        tokens_distributed: { type: 'number', format: 'float', example: 2500.50 }
      required: [tokens_distributed]
    RewardedActivityCount:
      type: array
      items:
        type: object
        properties:
          reward_count: { type: 'integer', example: 5000 }
        required: [reward_count]
    CharityItem:
      type: object
      properties:
        _id: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        charity_name: { type: 'string', example: 'Environmental Cause' }
        # Add other fields if your 'available_charities' has them
      required: [charity_name]
    UserBadgeItem:
      type: object
      properties:
        _id: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        user: { type: 'string', example: 'actifit-user' }
        badge_name: { type: 'string', example: 'Daily Achiever' }
        # Add other badge properties
      required: [user, badge_name]
    UserFriendItem:
      type: object
      properties:
        friend: { type: 'string', example: 'another-user' }
      required: [friend]
    NotificationUpdateStatus:
      type: object
      properties:
        status: { type: 'string', example: 'success' }
      required: [status]
    AFITBuyHiveResponse:
      type: object
      properties:
        status: { type: 'string', example: 'success' }
        boughtAmnt: { type: 'number', format: 'float', example: 123.45 }
        tokens: { type: 'number', format: 'float', example: 5000.00 }
      required: [status, boughtAmnt, tokens]
    CancelRefundSuccess:
      type: object
      properties:
        status: { type: 'string', example: 'success' }
      required: [status]
    ProductInfo:
      type: object
      properties:
        _id: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        name: { type: 'string', example: 'Actifit Smartwatch' }
        type: { type: 'string', example: 'real' }
        price:
          type: array
          items:
            type: object
            properties:
              price: { type: 'number', format: 'float', example: 100 }
              currency: { type: 'string', example: 'AFIT' }
              actifit_percent_cut: { type: 'integer', example: 10 }
        benefits:
          type: object
          properties:
