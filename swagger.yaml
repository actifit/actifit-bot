  /buyAFITHive/{user}/{amnt}/{afitAmnt}/{blockNo}/{trxID}/{bchain}:
    get:
      summary: Buy AFIT with HIVE
      description: Processes a transaction to buy AFIT tokens using HIVE.
      parameters:
        - in: path
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The buyer's username.
        - in: path
          name: amnt
          schema: { type: 'number', format: 'float', example: 10.5 }
          required: true
          description: The amount of HIVE paid.
        - in: path
          name: afitAmnt
          schema: { type: 'number', format: 'float', example: 100.0 }
          required: true
          description: The amount of AFIT requested by the buyer.
        - in: path
          name: blockNo
          schema: { type: 'integer', example: 123456789 }
          required: true
          description: The blockchain block number of the transaction.
        - in: path
          name: trxID
          schema: { type: 'string', example: 'tx_hash_abc123' }
          required: true
          description: The transaction ID.
        - in: path
          name: bchain
          schema: { type: 'string', example: 'HIVE', enum: ['HIVE', 'STEEM'] }
          required: true
          description: The blockchain used for payment.
      responses:
        '200':
          description: AFIT purchase successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AFITBuyHiveResponse'
        '400': { description: 'Transaction already verified or verification failed.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error or DB storing issue.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /cancelAFITBuy:
    get:
      summary: Cancel AFIT purchase and refund
      description: (ADMIN ONLY) Cancels a previous AFIT purchase and issues a refund by deducting AFIT from the user.
      parameters:
        - in: query
          name: specPass
          schema: { type: 'string', example: 'your_secret_pass' }
          required: true
          description: Special password for access.
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The user who had purchased AFIT.
        - in: query
          name: afit
          schema: { type: 'number', format: 'float', example: 100.0 }
          required: true
          description: The amount of AFIT to refund (deduct).
      responses:
        '200':
          description: AFIT purchase cancellation and refund processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelRefundSuccess'
        '400': { description: 'Invalid specPass or missing data.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error or DB storing issue.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /refundPurchase:
    get:
      summary: Refund a product purchase
      description: (ADMIN ONLY) Refunds a product purchase by crediting AFIT to the user.
      parameters:
        - in: query
          name: specPass
          schema: { type: 'string', example: 'your_secret_pass' }
          required: true
          description: Special password for access.
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The user who purchased the product.
        - in: query
          name: product_id
          schema: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
          required: true
          description: The ID of the product.
        - in: query
          name: afit_paid
          schema: { type: 'number', format: 'float', example: 500.0 }
          required: true
          description: The amount of AFIT to refund (credit).
      responses:
        '200':
          description: Product purchase refunded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelRefundSuccess'
        '400': { description: 'Invalid specPass, product not found, or missing data.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error or DB storing issue.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /updateProdStatus:
    get:
      summary: Update product order status
      description: (ADMIN ONLY) Updates the status of a real product order and notifies the user and management.
      parameters:
        - in: query
          name: specPass
          schema: { type: 'string', example: 'your_secret_pass' }
          required: true
          description: Special password for access.
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The user who made the purchase.
        - in: query
          name: status
          schema: { type: 'string', example: 'shipped', enum: ['pending', 'processing', 'shipped', 'delivered', 'cancelled'] }
          required: true
          description: The new status of the product order.
        - in: query
          name: trx_id
          schema: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
          required: true
          description: The MongoDB _id of the product purchase transaction.
        - in: query
          name: note
          schema: { type: 'string', example: 'Tracking number ABC123' }
          required: false
          description: An optional note regarding the status update.
      responses:
        '200':
          description: Product status updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProductStatusSuccess'
        '400': { description: 'Invalid specPass, transaction not found, or missing data.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /confirmProdReceipt:
    get:
      summary: Confirm product receipt
      description: (USER AUTHENTICATED) Confirms the receipt of a purchased product, updating its status to 'delivered'.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The user confirming receipt.
        - in: query
          name: trx_id
          schema: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
          required: true
          description: The MongoDB _id of the product purchase transaction.
        - in: query
          name: note
          schema: { type: 'string', example: 'Received and satisfied!' }
          required: false
          description: An optional note regarding the receipt confirmation.
      responses:
        '200':
          description: Product receipt confirmed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProductStatusSuccess'
        '400': { description: 'Missing data or transaction not found.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: 'Authenticated user not identified.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

