  /performTrxPost:
    post:
      summary: Perform a blockchain transaction (POST method)
      description: Submits a blockchain operation using the POST method, with the operation in the request body.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: bchain
          schema: { type: 'string', example: 'HIVE', enum: ['HIVE', 'STEEM', 'BLURT'], default: 'HIVE' }
          required: false
          description: The blockchain on which to perform the transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operation: { type: 'string', description: 'JSON string of the blockchain operation.', example: '{"id":"custom_json","json":{"my_data":"test"}}' }
