  /activateMultiGadgetKeychain/{user}/{gadgets}/{trxID}/{bchain}/{benefic?}:
    get:
      summary: Activate multiple gadgets via Keychain
      description: Activates multiple in-game gadgets for a user, with optional beneficiary, verified by a Keychain transaction.
      parameters:
        - in: path
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The user activating the gadgets.
        - in: path
          name: gadgets
          schema: { type: 'string', example: 'id1-id2-id3' }
          required: true
          description: Hyphen-separated MongoDB _ids of the gadgets to activate.
        - in: path
          name: trxID
          schema: { type: 'string', example: 'tx_hash_abc123' }
          required: true
          description: The transaction ID from Keychain.
        - in: path
          name: bchain
          schema: { type: 'string', example: 'HIVE', enum: ['HIVE', 'STEEM'] }
          required: true
          description: The blockchain of the transaction.
        - in: path
          name: benefic
          schema: { type: 'string', example: '@friend-user', nullable: true }
          required: false
          description: Optional username of the beneficiary.
      responses:
        '200':
          description: Gadgets activated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse' # Assuming {status: 'success'}
        '400': { description: 'User and beneficiary cannot be the same, or transaction verification failed/product not found.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

