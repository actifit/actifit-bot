    get:
      summary: Validate funds password for ebook download
      description: Validates a user's funds password to re-enable an ebook download link.
      parameters:
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The username.
        - in: query
          name: product_id
          schema: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
          required: true
          description: The product ID of the ebook.
        - in: query
          name: pass
          schema: { type: 'string', example: 'YourFundsPassword' }
          required: true
          description: The user's funds password.
      responses:
        '200':
          description: Password validated and download re-enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidatePassForDownloadSuccess'
        '400': { description: 'Account does not have a funds password, not verified, or incorrect password.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
  /downEbook:
    get:
      summary: Download an ebook
      description: Facilitates the download of an ebook if the user has a valid access token. Access token is disabled after use.
      parameters:
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The username.
        - in: query
          name: access_token
          schema: { type: 'string', example: 'download_token_abc' }
          required: true
          description: The access token for the ebook.
        - in: query
          name: product_id
          schema: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
          required: true
          description: The product ID of the ebook.
      responses:
        '200':
          description: Ebook file stream.
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400': { description: 'Access not permitted, user access not permitted, or file does not exist.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } } 
