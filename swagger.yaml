  /registerUserNotification:
    post:
      summary: Register user notification token
      description: Registers a device/app notification token for a user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: 'string', example: 'ExponentPushToken[xxxxxxxxxxxxxxxxxxxxxx]' }
                user: { type: 'string', example: 'actifit-user' }
                app: { type: 'string', example: 'actifit_app', enum: ['actifit_app', 'web_notifications'] }
                webid: { type: 'string', example: 'web_client_id_123', nullable: true } # For web notifications
              required: [token, user, app]
      responses:
        '200':
          description: Notification token registered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterUserNotificationSuccess'
        '400': { description: 'Missing data.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /mintProducts:
    get:
      summary: Mint in-game products
      description: (ADMIN ONLY) Increments the count of in-game products that have a count less than or equal to a minimum amount.
      parameters:
        - in: query
          name: secret
          schema: { type: 'string', example: 'your_minting_secret' }
          required: true
          description: The secret key for authorization.
        - in: query
          name: minAmount
          schema: { type: 'integer', example: 10, default: 0 }
          required: false
          description: The minimum count threshold for products to be minted.
        - in: query
          name: mintedAmount
