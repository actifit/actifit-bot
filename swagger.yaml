      responses:
        '200':
          description: Wallet address stored successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreUserWalletAddressSuccess'
        '400': { description: 'Missing required parameters.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: 'Authenticated user not identified.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
  /deleteUserWalletAddress:
    get:
