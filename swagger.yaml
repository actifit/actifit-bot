  /productBoughtToken:
    get:
      summary: Check if a product has been bought with an access token
      description: Checks if a user has bought a specific product with a given access token.
      parameters:
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The username to check.
        - in: query
          name: access_token
          schema: { type: 'string', example: 'download_token_abc' }
          required: true
          description: The access token.
        - in: query
          name: product_id
          schema: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
          required: true
          description: The product ID.
      responses:
        '200':
          description: Successfully fetched product purchase with token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { type: 'string', example: 'actifit-user' }
                  product_id: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
                  access_token: { type: 'string', example: 'download_token_abc' }
                  enabled: { type: 'boolean', example: true }
                  date: { type: 'string', format: 'date-time' }
                required: [user, product_id, access_token]
        '400': { description: 'Missing data.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

