        '400': { description: 'Missing data or user not eligible for another transaction today.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: 'Authenticated user not identified.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /verifySignBSCAddKeychain/{trxID}:
    get:
      summary: Verify signed BSC address and store via Keychain transaction
      description: Verifies an Ethereum signed message (BSC address) and stores it for the user, linked to a Hive Keychain transaction.
      parameters:
        - in: path
          name: trxID
          schema: { type: 'string', example: 'hive_tx_id_for_wallet_link' }
          required: true
          description: The Hive transaction ID that includes the wallet linking operation.
        - in: query
          name: operation
          schema: { type: 'string', example: '{"id":"custom_json","json":"{\\"wallet\\":\\"0x123abc...\\"}"}' }
          required: true
          description: The JSON string of the Hive custom_json operation.
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The Hive username.
        - in: query
          name: wallet
          schema: { type: 'string', example: '0x123abc456def789ghi012jkl345mno678pqr901st' }
          required: true
          description: The BSC wallet address to verify.
        - in: query
          name: nonce
          schema: { type: 'string', example: 'Actifit signing key...' }
          required: true
          description: The original nonce used in the Ethereum signature.
        - in: query
          name: sign
          schema: { type: 'string', example: '0x123456789...' }
          required: true
          description: The Ethereum signature.
        - in: query
          name: chain
          schema: { type: 'string', example: 'BSC', default: 'BSC' }
          required: false
          description: The blockchain of the wallet (e.g., BSC).
      responses:
        '200':
          description: BSC address verified and stored successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreUserWalletAddressSuccess' # Using generic success
        '400': { description: 'Missing required parameters, incorrect address, or invalid transaction.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /verifySignBSCAdd:
    get:
      summary: Verify signed BSC address
      description: Verifies an Ethereum signed message (BSC address) without linking to a Hive transaction. Requires authentication.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: nonce
          schema: { type: 'string', example: 'Actifit signing key...' }
          required: true
          description: The original nonce used in the Ethereum signature.
        - in: query
          name: sign
          schema: { type: 'string', example: '0x123456789...' }
          required: true
          description: The Ethereum signature.
        - in: query
          name: wallet
          schema: { type: 'string', example: '0x123abc456def789ghi012jkl345mno678pqr901st' }
          required: true
          description: The BSC wallet address to verify.
      responses:
        '200':
          description: BSC address verified successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifySignBSCAddSuccess'
        '400': { description: 'Missing required parameters or incorrect address.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: 'Authenticated user not identified.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /storeUserWalletAddress:
    get:
      summary: Store user's wallet address
      description: Stores a user's blockchain wallet address. Requires authentication.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The username.
        - in: query
          name: wallet
          schema: { type: 'string', example: '0x123abc456def789ghi012jkl345mno678pqr901st' }
          required: true
          description: The wallet address.
        - in: query
          name: chain
          schema: { type: 'string', example: 'BSC', default: 'BSC' }
