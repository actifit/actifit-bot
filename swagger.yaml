paths:
  /saveworkout:
    post:
      summary: Save a new workout plan
      description: Creates a new workout plan for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Workout'
            examples:
              newWorkout:
                value:
                  workoutName: "My First Workout Plan"
                  description: "A beginner-friendly full body routine."
                  exercises:
                    - name: "Push-ups"
                      sets: 3
                      reps: "8-12"
                      notes: "Keep core tight."
                  explanation: "This workout focuses on compound movements for overall strength."
      responses:
        '201':
          description: Workout plan saved successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      insertedId: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        '400': { description: 'Invalid request data.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: 'Authenticated user not identified.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /workouts:
    get:
      summary: Fetch all workouts for user
      description: Retrieves a list of all workout plans belonging to the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User workouts fetched successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/WorkoutResponse'
        '401': { description: 'Authenticated user not identified.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /workouts/{workoutId}:
    parameters:
      - in: path
        name: workoutId
        schema: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
        required: true
        description: The MongoDB _id of the workout.
    get:
      summary: Fetch specific workout by ID
      description: Retrieves a single workout plan by its ID, ensuring it belongs to the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Workout fetched successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorkoutResponse' }
        '400': { description: 'Invalid workout ID format.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: 'Authenticated user not identified.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '404': { description: 'Workout not found or does not belong to this user.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
    put:
      summary: Update specific workout by ID
      description: Updates an existing workout plan for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Workout' # Use the input Workout schema
            examples:
              updatedWorkout:
                value:
                  workoutName: "My First Workout Plan - UPDATED"
                  description: "An updated beginner-friendly full body routine, now with more details."
                  exercises:
                    - name: "Push-ups"
                      sets: 4
                      reps: "8-10"
                      notes: "Focus on form."
                    - name: "Squats"
                      sets: 3
                      reps: "10-15"
                  explanation: "This updated workout focuses on compound movements."
      responses:
        '200':
          description: Workout updated successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      workoutId: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
                      modifiedCount: { type: 'integer', example: 1 }
        '400': { description: 'Invalid request data or workout ID format.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: 'Authenticated user not identified.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '404': { description: 'Workout not found or does not belong to this user.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
    delete:
      summary: Delete specific workout by ID
      description: Deletes a specific workout plan for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Workout deleted successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      workoutId: { type: 'string', example: '651a9e8f1d2e3f4a5b6c7d8e' }
                      deletedCount: { type: 'integer', example: 1 }
        '400': { description: 'Invalid workout ID format.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: 'Authenticated user not identified.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '404': { description: 'Workout not found or does not belong to this user.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

