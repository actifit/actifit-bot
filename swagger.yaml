              required: [operation]
      responses:
        '200':
          description: Transaction performed successfully.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      trx: { $ref: '#/components/schemas/TransactionOutcome' }
        '400': { description: 'Operation not supplied.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '401': { description: 'Authenticated user not identified.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error or transaction failed.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

