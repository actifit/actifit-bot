  /modAction:
    get:
      summary: Perform moderator action
      description: Allows authorized moderators to perform various actions like ban/unban, reset password, reward posts, verify newbies, or generate free signup links.
      parameters:
        - in: query
          name: moderator
          schema: { type: 'string', example: 'actifit-mod' }
          required: true
          description: The moderator's username.
        - in: query
          name: fundsPass
          schema: { type: 'string', example: 'YourFundsPassword' }
          required: true
          description: The moderator's funds password for verification.
        - in: query
          name: targetAction
          schema:
            type: string
            enum: ['ban', 'unban', 'resetpass', 'reward', 'verifynewbie', 'freesignup']
            example: 'ban'
          required: true
          description: The action to be performed.
        - in: query
          name: banuser
          schema: { type: 'string', example: 'banned-user' }
          required: false # Required for 'ban' action
          description: Username to ban.
        - in: query
          name: ban_length
          schema: { type: 'string', example: '30 days' }
          required: false # Required for 'ban' action
          description: Duration of the ban.
        - in: query
          name: ban_reason
          schema: { type: 'string', example: 'Spamming' }
          required: false # Required for 'ban' action
          description: Reason for the ban.
        - in: query
          name: unbanuser
          schema: { type: 'string', example: 'unbanned-user' }
          required: false # Required for 'unban' action
          description: Username to unban.
        - in: query
          name: resetuser
          schema: { type: 'string', example: 'user-to-reset' }
          required: false # Required for 'resetpass' action
          description: Username to reset funds password for.
        - in: query
          name: fullurl
          schema: { type: 'string', example: 'https://hive.blog/actifit/@actifit-user/permlink' }
          required: false # Required for 'reward' action
          description: Full URL of the post to reward.
        - in: query
          name: power
          schema: { type: 'number', example: 100 }
          required: false # Required for 'reward' action
          description: Voting power percentage (0-100).
        - in: query
          name: account
          schema: { type: 'string', example: 'newbie-to-verify' }
          required: false # Required for 'verifynewbie' action
          description: Username of the newbie account to verify.
        - in: query
          name: verif_link
          schema: { type: 'string', format: 'url', example: 'https://twitter.com/post' }
          required: false # Required for 'verifynewbie' action
          description: Social media verification link.
        - in: query
          name: signusername
          schema: { type: 'string', example: 'referrer-user' }
          required: false # Required for 'freesignup' action
          description: Username to assign free signup links to.
        - in: query
          name: txlink
          schema: { type: 'string', example: 'https://hive.blog/tx/...' }
          required: false # Required for 'freesignup' action
          description: Transaction link for free signup.
        - in: query
          name: bchain
          schema: { type: 'string', example: 'HIVE', enum: ['HIVE', 'STEEM', 'BLURT'] }
          required: false # Required for 'reward' action
          description: The blockchain for the reward action.
      responses:
        '200':
          description: Moderator action performed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModActionSuccessResponse'
        '400': { description: 'Missing data or invalid action parameters.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ModActionErrorResponse' } } } }
        '401': { description: 'Unauthorized moderator or incorrect funds password.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ModActionErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

