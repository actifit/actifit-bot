          description: The username of the post owner.
        - in: query
          name: url
          schema: { type: 'string', example: 'https://hive.blog/actifit/@actifit-user/my-post' }
          required: true
          description: The full URL of the post.
      responses:
        '200':
          description: Successfully fetched post reward. Returns 0 if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostRewardResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /getPostFullAFITPayReward:
    get:
      summary: Get a post's full AFIT Pay reward
      description: Retrieves the full AFIT Pay reward for a specific user and post permalink, based on "Full AFIT Payout" reward activity.
      parameters:
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The username of the post owner.
        - in: query
          name: url
          schema: { type: 'string', example: 'https://hive.blog/actifit/@actifit-user/my-post' }
          required: true
          description: The full URL of the post (permlink will be extracted).
      responses:
        '200':
          description: Successfully fetched full AFIT Pay reward. Returns 0 if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostRewardResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /getCharityRewards:
    get:
      summary: Get total charity rewards and donor count
      description: Retrieves the total number of rewarded tokens to charities and the count of unique users who donated.
      responses:
        '200':
          description: Successfully fetched charity rewards statistics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CharityRewardsResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /getFullAFITPayPosts:
    get:
      summary: Get full AFIT Payout posts data
      description: Retrieves up to 1000 "Full AFIT Payout" posts, sorted by date.
      responses:
        '200':
          description: Successfully fetched full AFIT Payout posts.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FullAFITPayPostItem'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /getFullAFITPayStats:
    get:
      summary: Get full AFIT Pay statistics
      description: Retrieves aggregated statistics for "Full AFIT Payout" transactions, including AFIT, SBD, STEEM, SP amounts, and transaction count.
      responses:
        '200':
          description: Successfully fetched full AFIT Pay statistics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FullAFITPayStatsResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /moderatorActivity:
    get:
      summary: Get moderator activity
      description: Retrieves activity logs for active moderators within a specified date range.
      parameters:
        - in: query
          name: targetDate
          schema: { type: 'string', format: 'date', example: '2023-10-01' }
          required: false
          description: The target date (YYYY-MM-DD) for activity. Defaults to today.
        - in: query
          name: days
          schema: { type: 'integer', example: 1, default: 1 }
          required: false
          description: The number of days prior to `targetDate` to include in the activity.
      responses:
        '200':
          description: Successfully fetched moderator activity.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModeratorActivityItem'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /moderatorWeeklyStats:
    get:
      summary: Get moderator weekly statistics
      description: Retrieves weekly activity statistics for active moderators, focusing on comments and votes.
      parameters:
        - in: query
          name: priorWeek
          schema: { type: 'boolean', example: false }
          required: false
          description: If true, fetches stats for the previous full week (7 days).
      responses:
        '200':
          description: Successfully fetched moderator weekly stats.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModeratorWeeklyStatsItem'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /exchangeAFITPrice:
    get:
      summary: Get current AFIT token exchange price
      description: Retrieves the current exchange rates for AFIT (e.g., to HIVE/USD).
      responses:
        '200':
          description: Successfully fetched AFIT exchange prices.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExchangeAFITPriceResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /curAFITPrice:
    get:
      summary: Get current AFIT USD price
      description: Retrieves the current USD price of AFIT.
      responses:
        '200':
          description: Successfully fetched current AFIT price.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurAFITPriceResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /confirmPayment:
    get:
      summary: Confirm signup payment
      description: Confirms a new user signup payment (either via promo code or direct transfer) and initiates account creation and delegation.
      parameters:
        - in: query
          name: confirm_payment_token
          schema: { type: 'string', example: 'your_payment_confirmation_token' }
          required: true
          description: Security token to confirm payment.
        - in: query
          name: promo_code
          schema: { type: 'string', example: 'FREEACCT123', nullable: true }
          required: false
          description: Optional promo code used for signup.
        - in: query
          name: new_account
          schema: { type: 'string', example: 'new-user' }
          required: true
          description: The username for the new account.
        - in: query
          name: new_pass
          schema: { type: 'string', example: 'generated-password' }
          required: true
          description: The password for the new account.
        - in: query
          name: cur_bchain
          schema: { type: 'string', example: 'HIVE', enum: ['HIVE', 'STEEM'] }
          required: true
          description: The blockchain for the new account.
        - in: query
          name: usd_invest
          schema: { type: 'number', format: 'float', example: 1.0 }
          required: false
          description: USD amount invested.
        - in: query
          name: steem_invest
          schema: { type: 'number', format: 'float', example: 5.0 }
          required: false
          description: STEEM amount invested.
        - in: query
          name: afit_reward
          schema: { type: 'number', format: 'float', example: 100.0 }
          required: false
          description: AFIT reward for signup.
        - in: query
          name: memo
          schema: { type: 'string', example: 'signup_memo_hash', nullable: true }
          required: false
          description: The memo from the payment transaction.
        - in: query
          name: confirming_tx
          schema: { type: 'string', example: 'payment_tx_id_123', nullable: true }
          required: false
          description: The transaction ID confirming payment.
        - in: query
          name: referrer
          schema: { type: 'string', example: 'actifit-referrer', nullable: true }
          required: false
          description: Optional referrer username.
        - in: query
          name: email
          schema: { type: 'string', format: 'email', example: 'user@example.com', nullable: true }
          required: false
          description: Optional user email.
      responses:
        '200':
          description: Payment confirmed and account creation initiated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmPaymentResponse'
        '400': { description: 'Invalid confirmation token or payment already processed.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /getRC:
    get:
      summary: Get user's Resource Credits (RC)
      description: Retrieves the current Resource Credits percentage and details for a specified user on a given blockchain.
      parameters:
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The username to fetch RC for.
        - in: query
          name: chain
          schema: { type: 'string', example: 'HIVE', enum: ['HIVE', 'STEEM'] }
          required: true
          description: The blockchain to query.
      responses:
        '200':
          description: Successfully fetched user RC. Returns an empty object if no user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRCResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /sendNotification:
    get:
      summary: Send a notification
      description: Sends various types of notifications to users. Requires a specific security token.
      parameters:
        - in: query
          name: verifyNotifParam # This is dynamic in code, assuming 'token' for example
          schema: { type: 'string', example: 'your_notification_token' }
          required: true
          description: Security token to verify notification sending.
        - in: query
          name: notifType
          schema: { type: 'string', example: 'new_post', enum: ['new_post', 'new_comment', 'mention', 'transfer', 'vote', 'reblog', 'payment', 'hetokens'] }
          required: true
          description: The type of notification to send.
        - in: query
          name: user
          schema: { type: 'string', example: 'target-user' }
          required: true
          description: The recipient's username.
        - in: query
          name: actionTaker
          schema: { type: 'string', example: 'action-user' }
          required: false
          description: The username who triggered the action.
        - in: query
          name: title
          schema: { type: 'string', example: 'Your new report!', nullable: true }
          required: false
          description: Title or short description for the notification.
        - in: query
          name: permlink
          schema: { type: 'string', example: 'my-new-post', nullable: true }
          required: false
          description: Permlink related to the notification.
        - in: query
          name: subType
          schema: { type: 'string', example: 'author_reward', nullable: true }
          required: false
          description: Sub-type for 'payment' or 'hetokens' notifications.
        - in: query
          name: weight
          schema: { type: 'integer', example: 100, nullable: true }
          required: false
          description: Voting weight for 'vote' notifications.
        - in: query
          name: reward
          schema: { type: 'string', example: '1000.000 VESTS', nullable: true }
          required: false
          description: Reward amount for 'payment' sub-types.
        - in: query
          name: hbd_payout
          schema: { type: 'string', example: '1.234 HBD', nullable: true }
          required: false
          description: HBD payout for 'payment' sub-types.
        - in: query
          name: hive_payout
          schema: { type: 'string', example: '0.500 HIVE', nullable: true }
          required: false
          description: HIVE payout for 'payment' sub-types.
        - in: query
          name: vesting_payout
          schema: { type: 'string', example: '2000.000 VESTS', nullable: true }
          required: false
          description: Vesting payout for 'payment' sub-types.
        - in: query
          name: amount
          schema: { type: 'string', example: '500.000 VESTS', nullable: true }
          required: false
          description: Amount for 'return_vesting_delegation' or 'fill_vesting_withdraw'.
        - in: query
          name: amount_filled
          schema: { type: 'string', example: '10.000 AFIT', nullable: true }
          required: false
          description: Amount filled for 'fill_order'.
        - in: query
          name: amount_received
          schema: { type: 'string', example: '2.000 HIVE', nullable: true }
          required: false
          description: Amount received for 'fill_order'.
        - in: query
          name: quantity
          schema: { type: 'string', example: '5.0', nullable: true }
          required: false
          description: Quantity for 'hetokens' notifications.
        - in: query
          name: symbol
          schema: { type: 'string', example: 'AFIT', nullable: true }
          required: false
          description: Token symbol for 'hetokens' notifications.
        - in: query
          name: memo
          schema: { type: 'string', example: 'Your AFIT transfer', nullable: true }
          required: false
          description: Memo for 'hetokens' notifications.
        - in: query
          name: author
          schema: { type: 'string', example: 'post-author', nullable: true }
          required: false
          description: Author for 'payment' sub-types.
      responses:
        '200':
          description: Notification sent successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificationResponse'
        '400': { description: 'Missing security token or unsupported notification type.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /findUniqueUsers:
    get:
      summary: Find unique users over a period
      description: Queries the number of unique authors who have submitted verified posts within a specified number of days.
      parameters:
        - in: query
          name: days
          schema: { type: 'integer', example: 30, maximum: 30, default: 30 }
          required: false
          description: Number of days in the past to consider (max 30).
      responses:
        '200':
          description: Successfully fetched unique user count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindUniqueUsersResponse'
        '400': { description: 'Invalid days parameter.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /appendVerifiedPost:
    get:
      summary: Append a verified post
      description: Stores a post as "verified" in the database, ensuring it came through the Actifit API.
      parameters:
        - in: query
          name: verifyParam # This is dynamic in code, assuming 'token' for example
          schema: { type: 'string', example: 'your_verify_post_token' }
          required: true
          description: Security token to verify post authenticity.
        - in: query
          name: author
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The author of the post.
        - in: query
          name: permlink
          schema: { type: 'string', example: 'my-fitness-report' }
          required: true
          description: The permlink of the post.
        - in: query
          name: json_metadata
          schema: { type: 'string', example: '{"tags":["actifit"],"activity_type":"walking"}' }
          required: true
          description: JSON string of the post's metadata.
      responses:
        '200':
          description: Post verified and stored.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/AppendVerifiedPostResponse'
        '400': { description: 'Missing security token.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }
        '500': { description: 'Internal server error or DB storing issue.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /fetchVerifiedPost:
    get:
      summary: Fetch a verified post
      description: Retrieves a specific post from the verified posts collection.
      parameters:
        - in: query
          name: author
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The author of the post.
        - in: query
          name: permlink
          schema: { type: 'string', example: 'my-fitness-report' }
          required: true
          description: The permlink of the post.
      responses:
        '200':
          description: Successfully fetched verified post. Returns an empty object if not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifiedPostItem'
        '400': { description: 'Missing author or permlink.', content: { 'application/json': { schema: { type: 'object', example: {} } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { type: 'object', example: {} } } } }

  /userHasFundsPassSet/{user}:
    get:
      summary: Check if user has funds password set
      description: Checks if a user has a funds password recorded and if it's verified.
      parameters:
        - in: path
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The username to check.
      responses:
        '200':
          description: User funds password status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserHasFundsPassSetResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /setUserFundsPass/{user}/{pass}:
    get:
      summary: Set a user's funds password
      description: Sets or updates a user's funds password. There are restrictions on when it can be changed.
      parameters:
        - in: path
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The username setting the password.
        - in: path
          name: pass
          schema: { type: 'string', example: 'YourNewFundsPassword' }
          required: true
          description: The new funds password.
      responses:
        '200':
          description: Funds password set successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetUserFundsPassSuccess'
        '400': { description: 'Error setting password or restrictions apply.', content: { 'application/json': { schema: { $ref: '#/components/schemas/SetUserFundsPassError' } } } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /confirmPaymentPasswordVerify:
    get:
      summary: Confirm funds password verification payment
      description: Confirms a payment for funds password verification and updates the password status.
      parameters:
        - in: query
          name: bchain
          schema: { type: 'string', example: 'HIVE', enum: ['HIVE', 'STEEM'], default: 'HIVE' }
          required: false
          description: The blockchain of the payment.
        - in: query
          name: from
          schema: { type: 'string', example: 'paying-user' }
          required: true
          description: The user who sent the verification payment.
        - in: query
          name: trxID
          schema: { type: 'string', example: 'payment_tx_id_xyz' }
          required: true
          description: The transaction ID of the payment.
      responses:
        '200':
          description: Payment confirmed and password status updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmPaymentPasswordVerifyResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /confirmBuyAction:
    get:
      summary: Confirm AFIT purchase via STEEM/HIVE payment
      description: Confirms a payment for AFIT tokens made via STEEM or HIVE and credits the user's AFIT balance.
      parameters:
        - in: query
          name: bchain
          schema: { type: 'string', example: 'HIVE', enum: ['HIVE', 'STEEM'] }
          required: false
          description: The blockchain of the payment.
        - in: query
          name: from
          schema: { type: 'string', example: 'buyer-user' }
          required: true
          description: The user who sent the payment.
        - in: query
          name: steem_amount
          schema: { type: 'number', format: 'float', example: 5.0 }
          required: true
          description: The amount of STEEM/HIVE paid.
        - in: query
          name: afit_amount
          schema: { type: 'number', format: 'float', example: 100.0 }
          required: true
          description: The amount of AFIT to credit.
      responses:
        '200':
          description: Payment confirmed and AFIT credited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmBuyActionResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /userHasPendingTokenSwap/{user}:
    get:
      summary: Check for pending AFIT token swap
      description: Checks if a user has an unprocessed AFIT to STEEM upvote exchange request.
      parameters:
        - in: path
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The username to check.
      responses:
        '200':
          description: Pending token swap status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_pending_swap:
                    oneOf:
                      - $ref: '#/components/schemas/UserPendingTokenSwap'
                      - type: object # For null case
                example: { "user_pending_swap": { "_id": "651a9e8f1d2e3f4a5b6c7d8e", "user": "actifit-user", "paid_afit": 50, "upvote_processed": false, "date": "2023-10-01T12:00:00.000Z" } }
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /getUserTokenSwapHistory/{user}:
    get:
      summary: Get user's AFIT token swap history
      description: Retrieves a user's historical AFIT to STEEM upvote exchange transactions.
      parameters:
        - in: path
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The username to fetch history for.
      responses:
        '200':
          description: Successfully fetched token swap history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserTokenSwapHistoryResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /getPendingTokenSwapTransCount/:
    get:
      summary: Get count of pending AFIT to STEEM upvote exchanges
      description: Retrieves the total number of pending AFIT to STEEM upvote exchange requests.
      responses:
        '200':
          description: Successfully fetched pending token swap count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingTokenSwapCount'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /getPendingTokenSwapTrans/:
    get:
      summary: Get pending AFIT to STEEM upvote exchanges
      description: Retrieves a list of all pending AFIT to STEEM upvote exchange requests, excluding banned users.
      responses:
        '200':
          description: Successfully fetched pending token swap transactions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPendingTokenSwapTransResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /getProcessedTokenSwapTrans/:
    get:
      summary: Get processed AFIT to STEEM upvote exchanges
      description: Retrieves a list of all processed AFIT to STEEM upvote exchange transactions.
      parameters:
        - in: query
          name: limit
          schema: { type: 'integer', example: 300, default: 300 }
          required: false
          description: The maximum number of processed transactions to return.
      responses:
        '200':
          description: Successfully fetched processed token swap transactions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProcessedTokenSwapTransResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /getUnverifiedFundsAccountList/:
    get:
      summary: Get list of unverified funds accounts
      description: Retrieves a list of accounts that have set a funds password but not yet verified it.
      responses:
        '200':
          description: Successfully fetched unverified funds accounts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUnverifiedFundsAccountListResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /getFullFundsAccountList/:
    get:
      summary: Get full funds account list
      description: Retrieves a list of all accounts that have a funds password set (verified or not).
      responses:
        '200':
          description: Successfully fetched full funds account list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFullFundsAccountListResponse'
        '500': { description: 'Internal server error.', content: { 'application/json': { schema: { $ref: '#/components/schemas/ErrorResponse' } } } }

  /performAfitSteemExchange:
    get:
      summary: Perform AFIT to STEEM upvote exchange
      description: Initiates an exchange of AFIT tokens for a STEEM upvote. Requires funds password and sufficient AFIT balance.
      parameters:
        - in: query
          name: user
          schema: { type: 'string', example: 'actifit-user' }
          required: true
          description: The username performing the exchange.
        - in: query
          name: pass
          schema: { type: 'string', example: 'YourFundsPassword' }
          required: true
          description: The user's funds password.
        - in: query
          name: tokens
